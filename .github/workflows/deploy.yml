name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout (no submodules)
        uses: actions/checkout@v4
        with:
          submodules: false

      # Init only the upstream/rigor submodule, shallow and
      # non-recursive — its references/* nested submodules include
      # ruby/ruby (multi-GB) and two git@github.com: SSH URLs that
      # the runner cannot authenticate, and we never read those.
      #
      # The explicit tag refspec is required: `git submodule update`
      # does not fetch tags, and a shallow clone without tag refs makes
      # `git tag --points-at HEAD` return empty, so sync-rigor-docs
      # would otherwise omit the latest-release badge on every deploy.
      - name: Init upstream/rigor (shallow, non-recursive)
        run: |
          git submodule update --init --depth=1 upstream/rigor
          git -C upstream/rigor fetch --depth=1 origin '+refs/tags/*:refs/tags/*'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # The Cloudflare project for this site is a Worker (not a
          # Pages project). `wrangler deploy` reads wrangler.toml and
          # uploads `[assets]` directly to the existing Worker, which
          # already owns the rigor.typedduck.fail custom domain.
          command: deploy
