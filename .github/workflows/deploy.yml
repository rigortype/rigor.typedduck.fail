name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout (no submodules)
        uses: actions/checkout@v4
        with:
          submodules: false

      # Init only the upstream/rigor submodule, non-recursive — its
      # references/* nested submodules include ruby/ruby (multi-GB)
      # and two git@github.com: SSH URLs that the runner cannot
      # authenticate, and we never read those.
      #
      # We deliberately do NOT pass --depth=1: sync-rigor-docs runs
      # `git log -1 -- <file>` against this submodule to stamp each
      # synced page's sourceDate with the upstream file's last commit
      # date. A shallow clone collapses every file's history to the
      # single HEAD commit, making every sourceDate identical (the
      # build date) — which breaks the RecentlyUpdated table on the
      # site. The full upstream/rigor history is small (~20MB).
      #
      # The explicit tag refspec is kept as a safety net: `git clone`
      # fetches tags by default, but past shallow-clone defaults
      # taught us to be explicit about tag refs so `git tag
      # --points-at HEAD` reliably returns the latest-release badge.
      - name: Init upstream/rigor (full history, non-recursive)
        run: |
          git submodule update --init upstream/rigor
          git -C upstream/rigor fetch origin '+refs/tags/*:refs/tags/*'

      # Init upstream/chibirigor for sync-chibirigor-docs. As with
      # upstream/rigor, we do NOT pass --depth=1: the sync script runs
      # `git log -1 -- <file>` to stamp each book page's sourceDate with
      # the upstream file's last commit date, which a shallow clone would
      # collapse to a single uniform date.
      - name: Init upstream/chibirigor (full history, non-recursive)
        run: git submodule update --init upstream/chibirigor

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # The Cloudflare project for this site is a Worker (not a
          # Pages project). `wrangler deploy` reads wrangler.toml and
          # uploads `[assets]` directly to the existing Worker, which
          # already owns the rigor.typedduck.fail custom domain.
          command: deploy
